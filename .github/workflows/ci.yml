name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: vet + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./... -race -count=1

  e2e:
    name: e2e (GreenMail + Mailpit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      # ubuntu-latest ships with Docker, which testcontainers uses.
      - run: go test -tags e2e ./test/e2e/ -count=1 -timeout 600s
